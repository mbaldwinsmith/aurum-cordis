<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Serpent body: ~300° arc, gap at top, symmetric about x=32 -->
  <!-- Arc from (43,13) clockwise to (21,13), both equidistant from centre -->
  <path d="M 43 13 A 22 22 0 1 1 21 13"
        fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Head: triangle pointing up, base aligned with arc endpoints -->
  <polygon points="32,5 21,13 43,13" fill="currentColor" stroke="none"/>
  <!-- Subtle scale dashes -->
  <path d="M 43 13 A 22 22 0 1 1 21 13"
        fill="none" stroke="currentColor" stroke-width="1"
        stroke-dasharray="3 9" stroke-dashoffset="4" opacity="0.35"/>
</svg>
