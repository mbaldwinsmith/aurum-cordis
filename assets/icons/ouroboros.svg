<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Serpent body: near-complete circle, gap at upper-right (~60° arc gap) -->
  <!-- Arc from lower-right (51,43) counterclockwise ~300° to upper-right (51,21) -->
  <path d="M 51 43 A 22 22 0 1 0 51 21"
        fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Head: filled triangle, tip pointing down-right toward tail end -->
  <polygon points="51,29 45,19 57,19" fill="currentColor" stroke="none"/>
  <!-- Tiny scale detail on body (subtle dashes) -->
  <path d="M 51 43 A 22 22 0 1 0 51 21"
        fill="none" stroke="currentColor" stroke-width="1"
        stroke-dasharray="3 9" stroke-dashoffset="4" opacity="0.35"/>
</svg>
