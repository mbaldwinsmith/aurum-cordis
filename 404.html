<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found — Aurum Cordis" />
  <meta name="robots" content="noindex" />
  <title>Page Not Found — Aurum Cordis</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-10) var(--space-6);
    }
    .error-sigil {
      width: 96px;
      height: 96px;
      opacity: 0.35;
      margin-bottom: var(--space-8);
    }
    .error-code {
      font-family: var(--font-label);
      font-size: var(--text-xs);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--color-gold);
      margin-bottom: var(--space-4);
    }
    .error-title {
      font-family: var(--font-heading);
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--color-text-light);
      margin-bottom: var(--space-5);
      line-height: 1.2;
    }
    .error-body {
      font-family: var(--font-body);
      font-size: clamp(1rem, 2vw, 1.15rem);
      color: var(--color-text-muted);
      max-width: 42ch;
      line-height: 1.75;
      margin-bottom: var(--space-10);
    }
    .error-body em {
      font-style: italic;
      color: var(--color-text);
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <div class="grain-overlay" aria-hidden="true"></div>

  <main id="main-content" class="error-page">
    <svg class="error-sigil" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Ouroboros circle -->
      <circle cx="48" cy="48" r="42" stroke="var(--color-gold)" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
      <!-- Triangle (sulphur) -->
      <polygon points="48,14 78,66 18,66" stroke="var(--color-gold)" stroke-width="1.5" fill="none"/>
      <!-- Inner circle -->
      <circle cx="48" cy="48" r="10" stroke="var(--color-gold)" stroke-width="1" fill="none"/>
    </svg>

    <p class="error-code">404 — The Path Is Lost</p>

    <h1 class="error-title">This Page Has Returned to Prima Materia</h1>

    <p class="error-body">
      Like the <em>nigredo</em>, dissolution precedes transformation.
      The page you seek has dissolved back into the unformed.
      Return to the Great Work and begin again.
    </p>

    <a href="index.html" class="btn btn--primary">Return to the Great Work</a>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
