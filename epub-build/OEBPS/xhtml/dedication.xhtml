<body epub:type="dedication">
  <div class="dedication-page">

    <blockquote class="epigraph" epub:type="epigraph">
      <p><span class="latin">Ora et Labora et Lege</span></p>
      <p style="font-size: 0.85em; margin-top: 0.5em; color: #5a4a30;">
        Pray and Work and Read
      </p>
      <p style="font-size: 0.8em; margin-top: 1.5em; font-style: normal;
                font-family: 'Cinzel', serif; letter-spacing: 0.1em;
                text-transform: uppercase; color: #c9a227;">
        The motto of the Work
      </p>
    </blockquote>

    <hr class="ornamental"/>

    <blockquote class="epigraph" epub:type="epigraph">
      <p>&#x201C;The stone that is not a stone, cheap yet priceless,
      known to all yet found by few &#x2014;<br/>
      this is the beginning and the end of the work.&#x201D;</p>
      <p style="font-size: 0.85em; margin-top: 0.75em; color: #5a4a30;">
        &#x2014; <span class="latin">Rosarium Philosophorum</span>
      </p>
    </blockquote>

  </div>
